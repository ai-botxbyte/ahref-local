name: Ahref Checker VNC

on:
  workflow_dispatch:

env:
  DISPLAY: ":1"
  VNC_PORT: 5901
  NOVNC_PORT: 6080
  VNC_PASSWORD: "botxbyte123"
  AHREF_DIR: "/home/runner/ahref-local"
  # The script auto-routes between both queues — workflow doesn't pick.
  AHREF_MODES: "authority,traffic"
  # Master profile asset hosted on the test-abc GitHub release. ahrefs_checker.py
  # would download this itself on every run, but pre-downloading here gives
  # cleaner workflow logs and lets the watchdog restart the script instantly
  # (no re-download per restart).
  PROFILE_RELEASE_URL: "https://github.com/sanket-sakariya/test-abc/releases/download/worker-profile-v1/ahrefs-worker-profile.zip"
  AHREF_MASTER_PROFILE_DIR: "/tmp/ahref_master_profile"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Clone ahref-local code
        run: |
          echo "Cloning ahref-local repository..."
          rm -rf "$AHREF_DIR"
          git clone --depth 1 https://github.com/ai-botxbyte/ahref-local.git "$AHREF_DIR"
          echo "✅ ahref-local cloned to $AHREF_DIR"
          ls -la "$AHREF_DIR"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Optimize APT mirror
        timeout-minutes: 3
        run: |
          echo "Optimizing APT mirror and network settings..."
          sudo systemctl stop unattended-upgrades 2>/dev/null || true
          sudo killall -9 unattended-upgrades 2>/dev/null || true

          cat << 'EOF' | sudo tee /etc/apt/apt.conf.d/99ci-network >/dev/null
          Acquire::Retries "6";
          Acquire::http::Timeout "15";
          Acquire::https::Timeout "15";
          Acquire::ForceIPv4 "true";
          EOF

          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|mirror://mirrors.ubuntu.com/mirrors.txt|g' /etc/apt/sources.list.d/ubuntu.sources
            sudo sed -i 's|https://azure.archive.ubuntu.com/ubuntu|mirror://mirrors.ubuntu.com/mirrors.txt|g' /etc/apt/sources.list.d/ubuntu.sources
          fi
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|mirror://mirrors.ubuntu.com/mirrors.txt|g' /etc/apt/sources.list
            sudo sed -i 's|https://azure.archive.ubuntu.com/ubuntu|mirror://mirrors.ubuntu.com/mirrors.txt|g' /etc/apt/sources.list
          fi

          sudo apt-get -o Acquire::Retries=6 update -q
          echo "✅ APT optimization complete"

      - name: Install Desktop Environment (XFCE + Chrome + VNC)
        timeout-minutes: 18
        run: |
          echo "Installing XFCE desktop, Chrome, and TurboVNC..."
          sudo systemctl stop unattended-upgrades 2>/dev/null || true
          sudo killall -9 unattended-upgrades 2>/dev/null || true

          for i in $(seq 1 12); do
            if ! sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; then break; fi
            echo "Waiting for dpkg lock... ($i/12)"; sleep 5
          done

          mkdir -p ~/cached-debs

          # Parallel downloads
          (wget -q -O ~/cached-debs/google-chrome-stable_current_amd64.deb \
            https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb && echo "✅ Chrome downloaded") &
          PID_CHROME=$!
          (wget -q -O ~/cached-debs/turbovnc_2.2.5_amd64.deb \
            https://phoenixnap.dl.sourceforge.net/project/turbovnc/2.2.5/turbovnc_2.2.5_amd64.deb && echo "✅ TurboVNC downloaded") &
          PID_VNC=$!
          (cd ~ && git clone --depth 1 https://github.com/novnc/noVNC.git && \
            cd noVNC && git clone --depth 1 https://github.com/novnc/websockify.git && echo "✅ noVNC cloned") &
          PID_NOVNC=$!

          # Install XFCE while downloads happen
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" \
            xfce4 xfce4-terminal dbus-x11 x11-utils x11-xserver-utils xfonts-base net-tools

          echo "✅ XFCE installed"

          wait $PID_CHROME && sudo dpkg -i ~/cached-debs/google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y
          echo "✅ Chrome installed"

          wait $PID_VNC && sudo dpkg -i ~/cached-debs/turbovnc_2.2.5_amd64.deb
          echo "✅ TurboVNC installed"

          wait $PID_NOVNC
          echo "✅ noVNC ready"


      - name: Configure VNC Server
        run: |
          export PATH=$PATH:/opt/TurboVNC/bin
          mkdir -p ~/.vnc
          echo "${VNC_PASSWORD}" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

          cat > ~/.vnc/xstartup.turbovnc << 'EOF'
          #!/bin/bash
          export NO_AT_BRIDGE=1
          export SESSION_MANAGER=""
          dbus-launch /usr/bin/startxfce4 &
          EOF
          chmod +x ~/.vnc/xstartup.turbovnc
          echo "✅ VNC configured (password: botxbyte123)"

      - name: Start VNC Server
        run: |
          export PATH=$PATH:/opt/TurboVNC/bin
          echo "Starting TurboVNC server on display :1..."
          vncserver :1 -geometry 1920x1080 -depth 24 -rfbport $VNC_PORT 2>&1 | tee /tmp/vnc-start.log

          for i in $(seq 1 15); do
            if pgrep -f "Xvnc.*:1" > /dev/null; then
              echo "✅ TurboVNC started in ${i}s on port $VNC_PORT"
              exit 0
            fi
            sleep 1
          done
          echo "❌ Failed to start VNC server"; cat /tmp/vnc-start.log; exit 1

      - name: Start noVNC (Web VNC)
        run: |
          echo "Starting noVNC web server..."
          cd ~/noVNC
          ./utils/novnc_proxy --vnc localhost:$VNC_PORT --listen $NOVNC_PORT > /tmp/novnc.log 2>&1 &

          for i in $(seq 1 10); do
            if netstat -tuln | grep :$NOVNC_PORT > /dev/null; then
              echo "✅ noVNC started in ${i}s on port $NOVNC_PORT"
              exit 0
            fi
            sleep 1
          done
          echo "❌ noVNC failed to start"; cat /tmp/novnc.log; exit 1

      - name: Install cloudflared
        run: |
          echo "Installing cloudflared..."
          wget -q -O /tmp/cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cloudflared.deb
          cloudflared --version
          echo "✅ cloudflared installed"

      - name: Start Cloudflare Quick Tunnel
        id: tunnel
        run: |
          echo "Starting Cloudflare quick tunnel for noVNC..."
          cloudflared tunnel --no-autoupdate --url http://localhost:$NOVNC_PORT > /tmp/tunnel.log 2>&1 &

          # Wait for the trycloudflare URL to appear in the log
          TUNNEL_URL=""
          for i in $(seq 1 30); do
            TUNNEL_URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/tunnel.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then break; fi
            sleep 2
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to obtain tunnel URL"; cat /tmp/tunnel.log; exit 1
          fi

          echo "tunnel_url=$TUNNEL_URL" >> $GITHUB_OUTPUT
          echo "✅ Cloudflare tunnel ready: $TUNNEL_URL"

      - name: Download Master Profile (with cf-autoclick extension)
        timeout-minutes: 5
        run: |
          echo "[*] Downloading master profile from ${PROFILE_RELEASE_URL}"
          ZIP=/tmp/ahrefs-worker-profile.zip
          rm -rf "${AHREF_MASTER_PROFILE_DIR}" "${ZIP}"
          mkdir -p "${AHREF_MASTER_PROFILE_DIR}"

          # GitHub release assets always 302 → blob storage; -L follows it.
          # --retry 5 handles flaky CI runners; --fail bails on HTTP 4xx/5xx.
          curl -sSL --fail --retry 5 --retry-delay 3 \
            --connect-timeout 15 --max-time 240 \
            -o "${ZIP}" "${PROFILE_RELEASE_URL}"

          SIZE=$(du -h "${ZIP}" | cut -f1)
          echo "✅ Downloaded ${SIZE}"

          # Extract into a wrapper dir, then move the inner profile up so the
          # path layout is exactly what the local script expects:
          #   ${AHREF_MASTER_PROFILE_DIR}/Extensions/cf_autoclick/manifest.json
          STAGE=/tmp/ahref_master_stage
          rm -rf "${STAGE}" && mkdir -p "${STAGE}"
          unzip -q "${ZIP}" -d "${STAGE}"

          # Find the profile root — the dir containing Extensions/cf_autoclick.
          # The zip wraps everything in a single top-level dir (ahrefs-worker-profile/),
          # but be tolerant of either layout in case the release changes.
          FOUND=""
          for cand in "${STAGE}" "${STAGE}"/*/ ; do
            if [ -f "${cand}/Extensions/cf_autoclick/manifest.json" ]; then
              FOUND="${cand%/}"
              break
            fi
          done

          if [ -z "${FOUND}" ]; then
            echo "❌ Downloaded zip is malformed — no Extensions/cf_autoclick/manifest.json found"
            echo "    Contents:"
            ls -la "${STAGE}" || true
            exit 1
          fi

          # Move the contents of FOUND into AHREF_MASTER_PROFILE_DIR.
          # We use rsync (already installed on ubuntu-latest) so we don't
          # care whether FOUND == STAGE or a subdirectory.
          rsync -a "${FOUND}/" "${AHREF_MASTER_PROFILE_DIR}/"

          # Final sanity check
          if [ ! -f "${AHREF_MASTER_PROFILE_DIR}/Extensions/cf_autoclick/manifest.json" ]; then
            echo "❌ Extension missing after extraction: ${AHREF_MASTER_PROFILE_DIR}/Extensions/cf_autoclick/manifest.json"
            exit 1
          fi
          echo "✅ Master profile ready at ${AHREF_MASTER_PROFILE_DIR}"
          echo "    Profile size: $(du -sh ${AHREF_MASTER_PROFILE_DIR} | cut -f1)"

          # Clean up the intermediate files now — keep just the profile dir.
          rm -rf "${ZIP}" "${STAGE}"

      - name: Start Ahref Checker
        run: |
          echo "Starting ahrefs_checker.py (modes=${AHREF_MODES}, 1 worker, no proxy)..."
          export DISPLAY=:1
          export NO_AT_BRIDGE=1
          cd "$AHREF_DIR"
          nohup python3 ahrefs_checker.py --workers 1 --no-proxy --modes "${AHREF_MODES}" > /tmp/ahref-checker.log 2>&1 &
          CHECKER_PID=$!
          echo "  Checker PID: $CHECKER_PID (modes: ${AHREF_MODES})"
          sleep 5

          if kill -0 $CHECKER_PID 2>/dev/null; then
            echo "✅ Ahref checker started (PID: $CHECKER_PID, modes: ${AHREF_MODES})"
          else
            echo "❌ Ahref checker failed to start"; cat /tmp/ahref-checker.log; exit 1
          fi

      - name: Display Connection Info
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║              🎉 AHREF CHECKER VNC IS RUNNING! 🎉             ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "🌐 VNC Access URL: ${{ steps.tunnel.outputs.tunnel_url }}/vnc.html"
          echo "🔑 Password: botxbyte123"
          echo ""
          echo "🐍 ahrefs_checker.py running with: --workers 1 --no-proxy --modes ${AHREF_MODES}"
          echo "    (auto-routes between authority and traffic queues — whichever has work)"
          echo ""

      - name: Keep Session Alive
        run: |
          export PATH=$PATH:/opt/TurboVNC/bin
          set +e
          echo "Keeping VNC session alive..."

          while true; do
            echo "🌐 VNC: ${{ steps.tunnel.outputs.tunnel_url }}/vnc.html | Password: botxbyte123 | Modes: ${AHREF_MODES}"

            # Restart VNC if it died
            if ! pgrep -f "Xvnc.*:1" > /dev/null; then
              echo "❌ VNC stopped! Restarting..."
              vncserver :1 -geometry 1920x1080 -depth 24 -rfbport $VNC_PORT
              sleep 3
            fi

            # Restart tunnel if it died
            if ! pgrep -x "cloudflared" > /dev/null; then
              echo "❌ Tunnel stopped! Restarting..."
              cloudflared tunnel --no-autoupdate --url http://localhost:$NOVNC_PORT > /tmp/tunnel.log 2>&1 &
              sleep 5
            fi

            # Restart checker if it died — same modes the workflow was configured with.
            # AHREF_MASTER_PROFILE_DIR is exported via the workflow `env`, so the
            # restarted process reuses the already-downloaded master profile and
            # skips re-downloading it from GitHub.
            if ! pgrep -f "ahrefs_checker.py" > /dev/null; then
              echo "⚠️ Ahref checker stopped! Restarting (modes: ${AHREF_MODES}, profile: ${AHREF_MASTER_PROFILE_DIR})..."
              export DISPLAY=:1
              export NO_AT_BRIDGE=1
              cd "$AHREF_DIR"
              nohup python3 ahrefs_checker.py --workers 1 --no-proxy --modes "${AHREF_MODES}" > /tmp/ahref-checker.log 2>&1 &
              sleep 3
            fi

            sleep 30
          done

      - name: Cleanup VNC
        if: always()
        timeout-minutes: 1
        run: |
          export PATH=$PATH:/opt/TurboVNC/bin
          pkill -f "ahrefs_checker.py" || true
          pkill -x cloudflared || true
          vncserver -kill :1 || true
          echo "✅ Cleanup complete"
